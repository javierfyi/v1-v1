<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- STAIRS Wall Shelf - yellow staircase shape -->
  <!-- Bottom step -->
  <rect x="80" y="260" width="240" height="50" rx="2" fill="#e8b800" stroke="#c9a000" stroke-width="1.5"/>
  <!-- Middle step -->
  <rect x="80" y="180" width="180" height="50" rx="2" fill="#e8b800" stroke="#c9a000" stroke-width="1.5"/>
  <!-- Top step -->
  <rect x="80" y="100" width="120" height="50" rx="2" fill="#e8b800" stroke="#c9a000" stroke-width="1.5"/>
  <!-- Side connectors -->
  <rect x="80" y="100" width="8" height="210" fill="#d4a500"/>
  <rect x="192" y="100" width="8" height="130" fill="#d4a500"/>
  <rect x="252" y="180" width="8" height="130" fill="#d4a500"/>
  <rect x="312" y="260" width="8" height="50" fill="#d4a500"/>
</svg>
